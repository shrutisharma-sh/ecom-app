version: "3.8"

services:
  db:
    container_name: mysql
    image: mysql:8.1
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecom_db
      MYSQL_USER: shruti
      MYSQL_PASSWORD: shruti123
      TZ: Asia/Kolkata
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql-data: